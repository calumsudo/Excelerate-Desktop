name: release

on:
  release:
    types: [published]
  # Manual fallback: attach installers to an existing release (runs the
  # workflow from the selected branch instead of the tag's commit).
  workflow_dispatch:
    inputs:
      release_id:
        description: "ID of an existing GitHub release to attach installers to"
        required: true

permissions:
  contents: write

jobs:
  migrate:
    name: apply database migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          supabase db push

  build:
    name: build (${{ matrix.platform }}${{ matrix.args && format(' {0}', matrix.args) || '' }})
    needs: migrate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: npm ci

      # macOS: import the Developer ID certificate before building.
      # Uncomment once code signing is set up.
      # - name: Import Apple Developer ID certificate
      #   if: matrix.platform == 'macos-latest'
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }} # base64-encoded .p12
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      #   run: |
      #     echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
      #     security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
      #     rm certificate.p12

      - name: Build and attach installers to the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- macOS code signing + notarization (uncomment once set up) ---
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }} # e.g. "Developer ID Application: Your Name (TEAMID)"
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }} # app-specific password for notarization
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Windows code signing (uncomment once set up) ---
          # Option A: certificate-based — set "certificateThumbprint" in tauri.conf.json
          #   and import the pfx here, or
          # Option B: Azure Trusted Signing via a custom signCommand in tauri.conf.json.
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }} # base64-encoded .pfx
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id || inputs.release_id }}
          args: ${{ matrix.args }}
